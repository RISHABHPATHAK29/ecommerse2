<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>E-Commerce Shop</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f6f6f6;
}

/* HEADER */

header{
background:#0d6efd;
color:white;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h1{
font-size:22px;
}

nav a{
color:white;
margin-left:20px;
text-decoration:none;
font-weight:500;
}

/* PAGE TITLE */

.page-title{
text-align:center;
padding:40px;
}

.page-title h2{
font-size:32px;
margin-bottom:10px;
}

/* PRODUCT GRID */

.product-grid{
width:90%;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
padding-bottom:60px;
}

/* PRODUCT CARD */

.product-card{
background:white;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
overflow:hidden;
transition:0.3s;
}

.product-card:hover{
transform:translateY(-5px);
}

/* IMAGE */

.product-img{
width:100%;
height:200px;
overflow:hidden;
}

.product-img img{
width:100%;
height:100%;
object-fit:cover;
}

/* CONTENT */

.product-info{
padding:15px;
text-align:center;
}

.product-info h3{
margin-bottom:8px;
font-size:18px;
}

.product-info p{
color:#777;
margin-bottom:12px;
}

/* BUTTON */

.btn{
background:#0d6efd;
color:white;
border:none;
padding:10px 18px;
cursor:pointer;
border-radius:5px;
font-size:14px;
}

.btn:hover{
background:#0b5ed7;
}

/* CART ICON */

.cart-box{
position:fixed;
top:20px;
right:20px;
background:white;
padding:10px 15px;
border-radius:6px;
box-shadow:0 3px 10px rgba(0,0,0,0.15);
}

</style>

</head>

<body>

<header>

<h1>E-Commerce</h1>

<nav>
<a href="#">Home</a>
<a href="#">Shop</a>
<a href="#">Contact</a>
</nav>

</header>


<div class="page-title">

<h2>Featured Products</h2>
<p>Products from MongoDB + Azure Blob Storage</p>

</div>


<div class="product-grid" id="product-list">

<!-- products load here -->

</div>


<div class="cart-box">

Cart : <span id="cart-count">0</span>

</div>
<div style="text-align:center;margin-top:40px">
<button onclick="checkout()" class="btn">
Checkout
</button>
</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || []

document.getElementById("cart-count").innerText = cart.length


async function loadProducts(){

const response = await fetch("http://localhost:5000/api/products")

const products = await response.json()

const container = document.getElementById("product-list")

container.innerHTML=""

products.forEach(product=>{

const html = `

<div class="product-card">

<img src="${product.image}" width="200">

<h3>${product.name}</h3>

<p>$${product.price}</p>

<button onclick="addToCart('${product._id}')">
Add To Cart
</button>

</div>

`

container.innerHTML += html

})

}


function addToCart(id){

cart.push(id)

localStorage.setItem("cart",JSON.stringify(cart))

document.getElementById("cart-count").innerText = cart.length

alert("Added to cart")

}


async function checkout(){

if(cart.length===0){

alert("Cart empty")

return

}

for(const id of cart){

await fetch("http://localhost:5000/api/orders",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
productId:id,
quantity:1
})

})

}

localStorage.removeItem("cart")

cart=[]

document.getElementById("cart-count").innerText=0

alert("Order placed successfully")

}


loadProducts()

</script>


</body>
</html>
